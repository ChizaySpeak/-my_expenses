<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Подписки</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg:           var(--tg-theme-bg-color,           #ffffff);
      --bg2:          var(--tg-theme-secondary-bg-color, #f1f1f1);
      --text:         var(--tg-theme-text-color,         #000000);
      --hint:         var(--tg-theme-hint-color,         #8e8e93);
      --accent:       var(--tg-theme-button-color,       #2481cc);
      --accent-text:  var(--tg-theme-button-text-color,  #ffffff);
      --link:         var(--tg-theme-link-color,         #2481cc);
      --destructive:  #ff3b30;
      --green:        #34c759;
      --radius-card:  16px;
      --radius-btn:   12px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      background: var(--bg2);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 140px;
    }

    /* ── HEADER ── */
    .header {
      background: var(--bg);
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 50;
      border-bottom: 1px solid rgba(128,128,128,.12);
    }
    .header-title {
      flex: 1;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -.3px;
    }
    .header-count {
      font-size: 13px;
      color: var(--hint);
      font-weight: 400;
    }
    .btn-add {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--accent-text);
      border: none;
      font-size: 20px;
      line-height: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity .15s;
    }
    .btn-add:active { opacity: .7; }

    /* ── LIST ── */
    .list {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── CARD ── */
    .card {
      background: var(--bg);
      border-radius: var(--radius-card);
      padding: 14px 14px 12px;
      transition: opacity .2s;
    }
    .card.off { opacity: .45; }

    .card-row1 {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .card-name {
      flex: 1;
      font-size: 15px;
      font-weight: 600;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-price {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Toggle */
    .toggle { position: relative; width: 42px; height: 26px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute; inset: 0;
      background: #ccc;
      border-radius: 26px;
      transition: background .2s;
      cursor: pointer;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,.25);
      transition: transform .2s;
    }
    .toggle input:checked ~ .toggle-track { background: var(--green); }
    .toggle input:checked ~ .toggle-track::after { transform: translateX(16px); }

    /* Period pills */
    .periods {
      display: flex;
      gap: 6px;
    }
    .pill {
      flex: 1;
      padding: 7px 2px 6px;
      border-radius: 10px;
      border: 1.5px solid transparent;
      background: var(--bg2);
      color: var(--hint);
      font-size: 11.5px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all .15s;
      user-select: none;
    }
    .pill .pill-price { font-size: 10px; font-weight: 400; margin-top: 1px; opacity: .8; }
    .pill.active {
      background: var(--accent);
      color: var(--accent-text);
      border-color: var(--accent);
    }
    .pill.na {
      opacity: .3;
      cursor: default;
    }

    .card-note {
      font-size: 11.5px;
      color: var(--hint);
      margin-top: 8px;
      line-height: 1.4;
    }

    .card-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--bg2);
    }
    .card-btn {
      flex: 1;
      padding: 8px 4px;
      border-radius: var(--radius-btn);
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s;
    }
    .card-btn:active { opacity: .65; }
    .card-btn.edit { background: var(--bg2); color: var(--text); }
    .card-btn.del  { background: rgba(255,59,48,.1); color: var(--destructive); }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 64px 24px 24px;
      color: var(--hint);
    }
    .empty-icon { font-size: 52px; margin-bottom: 14px; }
    .empty-title { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .empty-sub   { font-size: 14px; line-height: 1.5; }

    /* ── BOTTOM SUMMARY ── */
    .summary {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--bg);
      border-top: 1px solid rgba(128,128,128,.15);
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      z-index: 50;
      box-shadow: 0 -4px 20px rgba(0,0,0,.08);
    }
    .summary-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .stab {
      flex: 1;
      padding: 6px 4px;
      border-radius: 20px;
      background: var(--bg2);
      color: var(--hint);
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .stab.active { background: var(--accent); color: var(--accent-text); }
    .summary-main {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    .summary-label { font-size: 13px; color: var(--hint); }
    .summary-amount { font-size: 22px; font-weight: 700; color: var(--accent); }
    .summary-detail {
      font-size: 11px;
      color: var(--hint);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── MODAL ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .sheet {
      width: 100%;
      background: var(--bg);
      border-radius: 20px 20px 0 0;
      padding: 6px 16px 20px;
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
      max-height: 92vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform .25s cubic-bezier(.4,0,.2,1);
    }
    .overlay.open .sheet { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--bg2);
      border-radius: 2px;
      margin: 8px auto 14px;
    }
    .sheet-title {
      font-size: 17px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 18px;
    }
    .field { margin-bottom: 14px; }
    .field-label {
      font-size: 12px;
      color: var(--hint);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .4px;
      margin-bottom: 6px;
      padding-left: 4px;
    }
    .field-input {
      width: 100%;
      padding: 12px 14px;
      border-radius: var(--radius-btn);
      background: var(--bg2);
      border: 1.5px solid transparent;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color .15s, background .15s;
    }
    .field-input:focus {
      border-color: var(--accent);
      background: var(--bg);
    }
    .prices-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .price-col { display: flex; flex-direction: column; gap: 5px; }
    .price-col-label { font-size: 11px; color: var(--hint); text-align: center; font-weight: 500; }

    .btn-save {
      width: 100%;
      padding: 14px;
      border-radius: var(--radius-btn);
      background: var(--accent);
      color: var(--accent-text);
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity .15s;
    }
    .btn-save:active { opacity: .75; }
    .btn-cancel {
      width: 100%;
      padding: 13px;
      border-radius: var(--radius-btn);
      background: var(--bg2);
      color: var(--text);
      border: none;
      font-size: 15px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .15s;
    }
    .btn-cancel:active { opacity: .65; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 150px;
      left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.78);
      color: #fff;
      padding: 9px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      z-index: 999;
      pointer-events: none;
      opacity: 0;
      transition: opacity .25s;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* ── LOADING ── */
    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 50vh;
      color: var(--hint);
      font-size: 15px;
      gap: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--bg2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-title">
    💳 Подписки
    <span class="header-count" id="headerCount"></span>
  </div>
  <button class="btn-add" onclick="openAdd()" aria-label="Добавить">+</button>
</div>

<div class="list" id="list">
  <div class="loading"><div class="spinner"></div> Загрузка…</div>
</div>

<div class="summary" id="summary">
  <div class="summary-tabs">
    <button class="stab active" data-p="month"     onclick="setSumPeriod('month')">В месяц</button>
    <button class="stab"        data-p="year"      onclick="setSumPeriod('year')">За год</button>
    <button class="stab"        data-p="two_years" onclick="setSumPeriod('two_years')">За 2 года</button>
  </div>
  <div class="summary-main">
    <span class="summary-label" id="sumLabel">Итого в месяц</span>
    <span class="summary-amount" id="sumAmount">0 ₽</span>
  </div>
  <div class="summary-detail" id="sumDetail"></div>
</div>

<!-- Modal sheet -->
<div class="overlay" id="overlay" onclick="onOverlayClick(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetTitle">Добавить сервис</div>
    <div class="field">
      <div class="field-label">Название</div>
      <input class="field-input" id="iName" placeholder="Например: Spotify" autocomplete="off" />
    </div>
    <div class="field">
      <div class="field-label">Цены (₽) — заполни нужные периоды</div>
      <div class="prices-row">
        <div class="price-col">
          <div class="price-col-label">В месяц</div>
          <input class="field-input" id="iMonth" type="number" inputmode="decimal" placeholder="0" />
        </div>
        <div class="price-col">
          <div class="price-col-label">За год</div>
          <input class="field-input" id="iYear" type="number" inputmode="decimal" placeholder="0" />
        </div>
        <div class="price-col">
          <div class="price-col-label">За 2 года</div>
          <input class="field-input" id="i2yr" type="number" inputmode="decimal" placeholder="0" />
        </div>
      </div>
    </div>
    <div class="field">
      <div class="field-label">Заметка (необязательно)</div>
      <input class="field-input" id="iNote" placeholder="Например: оплата раз в 2 года" autocomplete="off" />
    </div>
    <button class="btn-save" onclick="saveService()">Сохранить</button>
    <button class="btn-cancel" onclick="closeSheet()">Отмена</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── Telegram init ── */
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

/* ── Default data (from user's Numbers table) ── */
const DEFAULTS = [
  { id:'1', name:'Телеграмм',    active:true,
    prices:{month:299,  year:null, two_years:2990}, selected:'two_years',
    note:'оплата либо в месяц, либо за 2 года' },
  { id:'2', name:'Яндекс Плюс', active:true,
    prices:{month:449,  year:3490, two_years:6980}, selected:'two_years',
    note:'оплата 2 раза в 2 года' },
  { id:'3', name:'VK Музыка',   active:true,
    prices:{month:199,  year:1599, two_years:3198}, selected:'two_years',
    note:'оплата 2 раза в 2 года' },
  { id:'4', name:'Делимобиль',  active:true,
    prices:{month:390,  year:4680, two_years:9360}, selected:'month',
    note:'' },
];

/* ── State ── */
let services   = [];
let editId     = null;
let sumPeriod  = 'month';

/* ── Storage (CloudStorage → localStorage fallback) ── */
const STORE_KEY = 'subs_v2';

function saveData() {
  const val = JSON.stringify(services);
  if (tg?.CloudStorage) {
    tg.CloudStorage.setItem(STORE_KEY, val, err => {
      if (err) console.warn('CloudStorage write error:', err);
    });
  } else {
    try { localStorage.setItem(STORE_KEY, val); } catch(e){}
  }
}

function loadData() {
  return new Promise(resolve => {
    if (tg?.CloudStorage) {
      tg.CloudStorage.getItem(STORE_KEY, (err, val) => {
        if (err || !val) return resolve(null);
        try { resolve(JSON.parse(val)); } catch { resolve(null); }
      });
    } else {
      try {
        const val = localStorage.getItem(STORE_KEY);
        resolve(val ? JSON.parse(val) : null);
      } catch { resolve(null); }
    }
  });
}

/* ── Boot ── */
async function init() {
  const saved = await loadData();
  services = saved ?? DEFAULTS;
  render();
}

/* ── Render ── */
const PL = { month:'Месяц', year:'1 год', two_years:'2 года' };

function render() {
  const list = document.getElementById('list');
  const active = services.filter(s => s.active);
  document.getElementById('headerCount').textContent =
    services.length ? `· ${active.length} из ${services.length}` : '';

  if (!services.length) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">💳</div>
        <div class="empty-title">Нет подписок</div>
        <div class="empty-sub">Нажми + чтобы добавить первый сервис</div>
      </div>`;
    updateSummary();
    return;
  }

  list.innerHTML = services.map(s => {
    const pills = ['month','year','two_years'].map(p => {
      const price = s.prices[p];
      const isActive = s.selected === p;
      const isNa = !price;
      return `<button
        class="pill ${isActive ? 'active' : ''} ${isNa ? 'na' : ''}"
        ${isNa ? 'disabled' : `onclick="setPeriod('${s.id}','${p}')"`}
      >
        ${PL[p]}
        <div class="pill-price">${price ? fmt(price)+' ₽' : '—'}</div>
      </button>`;
    }).join('');

    const curPrice = s.prices[s.selected] ?? 0;

    return `<div class="card ${s.active ? '' : 'off'}" id="c-${s.id}">
      <div class="card-row1">
        <label class="toggle">
          <input type="checkbox" ${s.active ? 'checked' : ''}
            onchange="toggleActive('${s.id}',this.checked)">
          <span class="toggle-track"></span>
        </label>
        <span class="card-name">${esc(s.name)}</span>
        <span class="card-price">${fmt(curPrice)} ₽</span>
      </div>
      <div class="periods">${pills}</div>
      ${s.note ? `<div class="card-note">📌 ${esc(s.note)}</div>` : ''}
      <div class="card-actions">
        <button class="card-btn edit" onclick="openEdit('${s.id}')">✏️ Изменить</button>
        <button class="card-btn del"  onclick="deleteService('${s.id}')">🗑 Удалить</button>
      </div>
    </div>`;
  }).join('');

  updateSummary();
}

/* ── Summary ── */
const SUM_LABELS = { month:'Итого в месяц', year:'Итого за год', two_years:'Итого за 2 года' };

function updateSummary() {
  const active = services.filter(s => s.active);
  let total = 0, parts = [];

  active.forEach(s => {
    const p = s.prices[s.selected] ?? 0;
    let normalized = 0;
    if      (s.selected === 'month')     normalized = sumPeriod === 'month' ? p : sumPeriod === 'year' ? p*12  : p*24;
    else if (s.selected === 'year')      normalized = sumPeriod === 'month' ? p/12: sumPeriod === 'year' ? p    : p*2;
    else if (s.selected === 'two_years') normalized = sumPeriod === 'month' ? p/24: sumPeriod === 'year' ? p/2  : p;
    total += normalized;
    if (p) parts.push(`${s.name}: ${fmt(Math.round(normalized))}₽`);
  });

  document.getElementById('sumLabel').textContent  = SUM_LABELS[sumPeriod];
  document.getElementById('sumAmount').textContent = fmt(Math.round(total)) + ' ₽';
  document.getElementById('sumDetail').textContent = parts.join('  ·  ');
}

function setSumPeriod(p) {
  sumPeriod = p;
  document.querySelectorAll('.stab').forEach(b =>
    b.classList.toggle('active', b.dataset.p === p));
  updateSummary();
}

/* ── Card actions ── */
function toggleActive(id, val) {
  const s = services.find(s => s.id === id);
  if (!s) return;
  s.active = val;
  document.getElementById('c-'+id)?.classList.toggle('off', !val);
  updateSummary();
  saveData();
}

function setPeriod(id, period) {
  const s = services.find(s => s.id === id);
  if (!s) return;
  s.selected = period;
  render(); saveData();
}

function deleteService(id) {
  const s = services.find(s => s.id === id);
  if (!s) return;
  const doDelete = () => {
    services = services.filter(s => s.id !== id);
    render(); saveData(); toast('Удалено');
  };
  if (tg) tg.showConfirm(`Удалить «${s.name}»?`, ok => ok && doDelete());
  else if (confirm(`Удалить «${s.name}»?`)) doDelete();
}

/* ── Modal ── */
function openAdd() {
  editId = null;
  document.getElementById('sheetTitle').textContent = 'Добавить сервис';
  document.getElementById('iName').value  = '';
  document.getElementById('iMonth').value = '';
  document.getElementById('iYear').value  = '';
  document.getElementById('i2yr').value   = '';
  document.getElementById('iNote').value  = '';
  openSheet();
  setTimeout(() => document.getElementById('iName').focus(), 300);
}

function openEdit(id) {
  const s = services.find(s => s.id === id);
  if (!s) return;
  editId = id;
  document.getElementById('sheetTitle').textContent = 'Изменить сервис';
  document.getElementById('iName').value  = s.name;
  document.getElementById('iMonth').value = s.prices.month      ?? '';
  document.getElementById('iYear').value  = s.prices.year       ?? '';
  document.getElementById('i2yr').value   = s.prices.two_years  ?? '';
  document.getElementById('iNote').value  = s.note ?? '';
  openSheet();
}

function openSheet()  { document.getElementById('overlay').classList.add('open'); }
function closeSheet() { document.getElementById('overlay').classList.remove('open'); }
function onOverlayClick(e) { if (e.target === document.getElementById('overlay')) closeSheet(); }

function saveService() {
  const name = document.getElementById('iName').value.trim();
  if (!name) { toast('Введи название!'); return; }

  const month     = parseNum(document.getElementById('iMonth').value);
  const year      = parseNum(document.getElementById('iYear').value);
  const two_years = parseNum(document.getElementById('i2yr').value);
  const note      = document.getElementById('iNote').value.trim();

  if (!month && !year && !two_years) { toast('Укажи хотя бы одну цену!'); return; }

  const prices = { month, year, two_years };

  if (editId) {
    const s = services.find(s => s.id === editId);
    s.name   = name;
    s.prices = prices;
    s.note   = note;
    if (!prices[s.selected]) s.selected = month ? 'month' : year ? 'year' : 'two_years';
  } else {
    services.push({
      id: Date.now().toString(),
      name, active: true, prices,
      selected: month ? 'month' : year ? 'year' : 'two_years',
      note
    });
  }

  closeSheet();
  render(); saveData();
  toast(editId ? 'Сохранено ✓' : 'Добавлено ✓');
}

/* ── Helpers ── */
function parseNum(v) { const n = parseFloat(v); return isNaN(n) || n <= 0 ? null : n; }
function fmt(n) { return Math.round(n).toLocaleString('ru-RU'); }
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

init();
</script>
</body>
</html>
