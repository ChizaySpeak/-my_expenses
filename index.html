<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Мои финансы</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg:var(--tg-theme-bg-color,#fff);
  --bg2:var(--tg-theme-secondary-bg-color,#f1f1f1);
  --text:var(--tg-theme-text-color,#000);
  --hint:var(--tg-theme-hint-color,#8e8e93);
  --accent:var(--tg-theme-button-color,#2481cc);
  --at:var(--tg-theme-button-text-color,#fff);
  --red:#ff3b30;--green:#34c759;--orange:#ff9500;--purple:#af52de;
  --r:14px;--nav:60px;--hdr:52px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;background:var(--bg2);color:var(--text);min-height:100vh}

/* ── HEADER ── */
.hdr{height:var(--hdr);background:var(--bg);display:flex;align-items:center;padding:0 16px;gap:8px;
  position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(128,128,128,.1)}
.hdr-title{flex:1;font-size:18px;font-weight:700}
.hdr-btn{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
.hdr-btn:active{opacity:.6}
.hdr-btn.add{background:var(--accent);color:var(--at);font-size:22px}
.hdr-btn.share{background:var(--bg2);color:var(--text);font-size:16px}
/* Новая кнопка доната */
.hdr-btn.donate{background:var(--bg2);color:#ff3b30;font-size:18px}
/* ── LAYOUT ── */
.main{padding-bottom:var(--nav)}
.tab{display:none}
.tab.active{display:block}
.tab-body{padding:12px 16px 24px;display:flex;flex-direction:column;gap:8px}

/* ── BOTTOM NAV ── */
.nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav) + env(safe-area-inset-bottom));
  background:var(--bg);border-top:1px solid rgba(128,128,128,.1);display:flex;
  padding-bottom:env(safe-area-inset-bottom);z-index:100}
.nav-btn{flex:1;border:none;background:transparent;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--hint);transition:color .15s}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:21px;line-height:1}
.nav-label{font-size:10px;font-weight:500}

/* ── SUMMARY CARD ── */
.sum-card{background:var(--accent);border-radius:var(--r);padding:14px 16px;color:var(--at)}
.sum-card-top{font-size:12px;opacity:.8;margin-bottom:2px}
.sum-card-amt{font-size:28px;font-weight:700;letter-spacing:-.5px}
.sum-card-sub{font-size:12px;opacity:.7;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sum-tabs{display:flex;gap:6px;margin-top:10px}
.stab{padding:5px 12px;border-radius:20px;background:rgba(255,255,255,.2);color:rgba(255,255,255,.8);
  border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.stab.active{background:rgba(255,255,255,.95);color:var(--accent)}

/* ── GENERIC CARD ── */
.card{background:var(--bg);border-radius:var(--r);padding:14px;transition:opacity .2s}
.card.off{opacity:.42}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.card-name{flex:1;font-size:15px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-amt{font-size:16px;font-weight:700;color:var(--accent);white-space:nowrap;flex-shrink:0}
.card-note{font-size:11.5px;color:var(--hint);margin-top:6px}
.card-actions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--bg2)}
.card-btn{flex:1;padding:8px;border-radius:10px;border:none;font-size:12.5px;font-weight:500;cursor:pointer;transition:opacity .15s}
.card-btn:active{opacity:.6}
.card-btn.e{background:var(--bg2);color:var(--text)}
.card-btn.d{background:rgba(255,59,48,.1);color:var(--red)}

/* ── TOGGLE ── */
.tog{position:relative;width:42px;height:26px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-tr{position:absolute;inset:0;background:#ccc;border-radius:26px;cursor:pointer;transition:background .2s}
.tog-tr::after{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;
  border-radius:50%;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .2s}
.tog input:checked~.tog-tr{background:var(--green)}
.tog input:checked~.tog-tr::after{transform:translateX(16px)}

/* ── PERIOD PILLS ── */
.pills{display:flex;gap:6px}
.pill{flex:1;padding:7px 2px 6px;border-radius:10px;border:1.5px solid transparent;
  background:var(--bg2);color:var(--hint);font-size:11.5px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.pill-sub{font-size:10px;font-weight:400;margin-top:1px;opacity:.8}
.pill.on{background:var(--accent);color:var(--at)}
.pill.na{opacity:.3;cursor:default}

/* ── EXPENSE FREQ BADGE ── */
.freq-badge{font-size:11px;color:var(--hint);background:var(--bg2);padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}

/* ── SHOPPING ITEMS ── */
.shop-item{background:var(--bg);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;gap:10px}
.shop-chk{width:24px;height:24px;border-radius:50%;border:2px solid var(--hint);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.shop-chk.done{background:var(--green);border-color:var(--green)}
.shop-chk.done::after{content:'✓';font-size:13px;color:#fff;font-weight:700}
.shop-info{flex:1;min-width:0}
.shop-name{font-size:15px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.shop-name.done{text-decoration:line-through;opacity:.45}
.shop-meta{font-size:12px;color:var(--hint);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.shop-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0}
.shop-acts{display:flex;gap:4px;flex-shrink:0}
.icon-btn{width:30px;height:30px;border-radius:50%;border:none;background:var(--bg2);
  cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:opacity .15s}
.icon-btn:active{opacity:.6}
.prog-bar{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}

/* ── WISHLIST CARDS ── */
.wish-card{background:var(--bg);border-radius:var(--r);overflow:hidden}
.wish-img{width:100%;height:160px;object-fit:cover;display:block}
.wish-img-ph{width:100%;height:80px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--hint)}
.wish-body{padding:12px 14px}
.wish-name{font-size:16px;font-weight:700;margin-bottom:6px;line-height:1.3}
.wish-badges{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge.high{background:rgba(255,149,0,.15);color:var(--orange)}
.badge.dream{background:rgba(175,82,222,.15);color:var(--purple)}
.badge.hid{background:var(--bg2);color:var(--hint)}
.badge.booked{background:rgba(52,199,89,.15);color:var(--green)}
.badge.full{background:rgba(52,199,89,.2);color:var(--green)}
.wish-desc{font-size:13px;color:var(--hint);margin-bottom:8px;line-height:1.45}
.wish-price{font-size:18px;font-weight:700;color:var(--accent);margin-bottom:10px}
.wish-price.hid{color:var(--hint);font-size:13px;font-style:italic;font-weight:400}
.wish-footer{display:flex;gap:6px;padding-top:10px;border-top:1px solid var(--bg2);flex-wrap:wrap}
.vis-btn{width:32px;height:32px;border-radius:50%;border:none;background:var(--bg2);cursor:pointer;font-size:14px;flex-shrink:0;transition:opacity .15s}
.vis-btn:active{opacity:.6}

/* ── SHARED VIEW ── */
.sv{position:fixed;inset:0;background:var(--bg2);z-index:300;display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity .25s}
.sv.open{opacity:1;pointer-events:all}
.sv-hdr{background:var(--bg);padding:14px 16px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid rgba(128,128,128,.1);flex-shrink:0}
.sv-title{flex:1;font-size:17px;font-weight:700}
.sv-close{width:30px;height:30px;border-radius:50%;border:none;background:var(--bg2);cursor:pointer;font-size:16px}
.sv-body{flex:1;overflow-y:auto;padding:12px 16px 40px;display:flex;flex-direction:column;gap:8px}
.sv-owner{font-size:13px;color:var(--hint);text-align:center;padding:4px}

/* ── BOTTOM SHEET ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:400;display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity .22s}
.ov.open{opacity:1;pointer-events:all}
.sheet{width:100%;background:var(--bg);border-radius:20px 20px 0 0;padding:6px 16px;
  padding-bottom:calc(20px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;
  transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.ov.open .sheet{transform:translateY(0)}
.sh-handle{width:36px;height:4px;background:var(--bg2);border-radius:2px;margin:8px auto 14px}
.sh-title{font-size:17px;font-weight:700;text-align:center;margin-bottom:18px}
.field{margin-bottom:14px}
.fl{font-size:12px;color:var(--hint);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;padding-left:2px}
.fi{width:100%;padding:12px 14px;border-radius:12px;background:var(--bg2);border:1.5px solid transparent;
  color:var(--text);font-size:15px;outline:none;transition:border-color .15s,background .15s}
.fi:focus{border-color:var(--accent);background:var(--bg)}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pc-label{font-size:11px;color:var(--hint);text-align:center;margin-bottom:4px}
.btn-p{width:100%;padding:14px;border-radius:12px;background:var(--accent);color:var(--at);
  border:none;font-size:16px;font-weight:600;cursor:pointer;margin-top:6px;transition:opacity .15s}
.btn-p:active{opacity:.75}
.btn-s{width:100%;padding:13px;border-radius:12px;background:var(--bg2);color:var(--text);
  border:none;font-size:15px;cursor:pointer;margin-top:8px;transition:opacity .15s}
.btn-s:active{opacity:.65}
.check-row{display:flex;align-items:center;gap:10px;padding:10px 0}
.check-row span{flex:1;font-size:15px}
.sel-group{display:flex;gap:6px;flex-wrap:wrap}
.sel-btn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--bg2);background:var(--bg2);
  color:var(--hint);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.sel-btn.on{border-color:var(--accent);background:var(--accent);color:var(--at)}
.ph-preview{width:100%;height:110px;border-radius:10px;object-fit:cover;margin-top:8px;display:none}
.ph-preview.show{display:block}
.link-box{background:var(--bg2);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--hint);
  word-break:break-all;margin:8px 0;line-height:1.5}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 24px 24px;color:var(--hint)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-size:17px;font-weight:600;color:var(--text);margin-bottom:6px}
.empty-sub{font-size:14px;line-height:1.5}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(var(--nav) + 16px);left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.78);color:#fff;padding:9px 20px;border-radius:20px;font-size:14px;
  font-weight:500;z-index:999;pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap}
.toast.show{opacity:1}

/* ── LOADING ── */
.loading{display:flex;align-items:center;justify-content:center;height:50vh;color:var(--hint);font-size:15px;gap:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2px solid var(--bg2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr" id="hdr">
  <div class="hdr-title" id="hdrTitle">💳 Мои Финансы</div>
  <button class="hdr-btn share" id="btnShare" onclick="onShare()" style="display:none">🔗</button>
  <!-- Новая кнопка доната -->
  <button class="hdr-btn donate" onclick="openDonateLink()" title="Поддержать проект">❤️</button>
  <button class="hdr-btn add" onclick="onAdd()">+</button>
</header>

<!-- MAIN -->
<main class="main">
  <div class="tab active" id="tabSubs"><div class="tab-body" id="listSubs"><div class="loading"><div class="spinner"></div>Загрузка…</div></div></div>
  <div class="tab" id="tabExp"><div class="tab-body" id="listExp"><div class="loading"><div class="spinner"></div>Загрузка…</div></div></div>
  <div class="tab" id="tabShop"><div class="tab-body" id="listShop"><div class="loading"><div class="spinner"></div>Загрузка…</div></div></div>
  <div class="tab" id="tabWish"><div class="tab-body" id="listWish"><div class="loading"><div class="spinner"></div>Загрузка…</div></div></div>
</main>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" data-t="Subs" onclick="goto('Subs')"><span class="nav-icon">💳</span><span class="nav-label">Подписки</span></button>
  <button class="nav-btn" data-t="Exp" onclick="goto('Exp')"><span class="nav-icon">💸</span><span class="nav-label">Расходы</span></button>
  <button class="nav-btn" data-t="Shop" onclick="goto('Shop')"><span class="nav-icon">🛒</span><span class="nav-label">Покупки</span></button>
  <button class="nav-btn" data-t="Wish" onclick="goto('Wish')"><span class="nav-icon">🎁</span><span class="nav-label">Вишлист</span></button>
</nav>

<!-- SHARED VIEW -->
<div class="sv" id="sv">
  <div class="sv-hdr">
    <div class="sv-title" id="svTitle">Вишлист</div>
    <button class="sv-close" onclick="closeSV()">✕</button>
  </div>
  <div class="sv-body" id="svBody"></div>
</div>

<!-- MODAL OVERLAY -->
<div class="ov" id="ov" onclick="ovBg(event)"><div class="sheet" id="sheet"></div></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ────────────────────────────────── TELEGRAM ── */
const tg = window.Telegram?.WebApp;
if (tg){tg.ready();tg.expand();}

/* ────────────────────────────────── DONATE ── */
// Замените USERNAME на ваш реальный username на Boosty
function openDonateLink() {
    const donateUrl = 'https://boosty.to/chizzayspeak/donate'; // 👈 СЮДА ВСТАВЬТЕ ВАШ USERNAME
    if (tg && tg.openLink) {
        tg.openLink(donateUrl);
    } else {
        window.open(donateUrl, '_blank');
    }
}

/* ────────────────────────────────── STATE ── */
const S = {
  subs:[],exps:[],shops:[],wishes:[],
  subP:'month',expP:'month',
  tab:'Subs',editId:null,
  wPriority:'normal',wHidePrice:false,wVisible:true,wMaxBook:1,
  pendingBookItem:null,
};

/* ────────────────────────────────── STORAGE ── */
const K={subs:'subs_v3',exps:'exps_v1',shops:'shop_v1',wishes:'wish_v1'};

async function load(key){
  return new Promise(r=>{
    if(tg?.CloudStorage){
      tg.CloudStorage.getItem(key,(err,v)=>{
        if(err||!v)return r(null);
        try{r(JSON.parse(v))}catch{r(null)}
      });
    }else{
      try{const v=localStorage.getItem(key);r(v?JSON.parse(v):null)}catch{r(null)}
    }
  });
}
function save(key,data){
  const v=JSON.stringify(data);
  if(tg?.CloudStorage){tg.CloudStorage.setItem(key,v,e=>e&&console.warn(e));}
  else{try{localStorage.setItem(key,v)}catch{}}
}

/* ────────────────────────────────── DEFAULTS ── */
const DEF_SUBS=[
  {id:'s1',name:'Телеграмм',   active:true,prices:{month:299, year:null,two_years:2990},sel:'two_years',note:'оплата либо в месяц, либо за 2 года'},
  {id:'s2',name:'Яндекс Плюс',active:true,prices:{month:449, year:3490,two_years:6980},sel:'two_years',note:'оплата 2 раза в 2 года'},
  {id:'s3',name:'VK Музыка',  active:true,prices:{month:199, year:1599,two_years:3198},sel:'two_years',note:'оплата 2 раза в 2 года'},
  {id:'s4',name:'Делимобиль', active:true,prices:{month:390, year:4680,two_years:9360},sel:'month',    note:''},
];

/* ────────────────────────────────── INIT ── */
async function init(){
  const hash=location.hash;
  if(hash.startsWith('#wl=')){const d=dec(hash.slice(4));if(d)showSVWish(d);}
  if(hash.startsWith('#sl=')){const d=dec(hash.slice(4));if(d)showSVShop(d);}

  const [a,b,c,d]=await Promise.all([load(K.subs),load(K.exps),load(K.shops),load(K.wishes)]);
  S.subs=a??DEF_SUBS; S.exps=b??[]; S.shops=c??[]; S.wishes=d??[];
  rSubs();rExp();rShop();rWish();
}

/* ────────────────────────────────── NAVIGATION ── */
const TAB={Subs:{t:'💳 Подписки',share:false},Exp:{t:'💸 Расходы',share:false},Shop:{t:'🛒 Покупки',share:true},Wish:{t:'🎁 Вишлист',share:true}};
function goto(tab){
  S.tab=tab;
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
  document.getElementById('tab'+tab).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.t===tab));
  document.getElementById('hdrTitle').textContent=TAB[tab].t;
  document.getElementById('btnShare').style.display=TAB[tab].share?'flex':'none';
}
function onAdd(){if(S.tab==='Subs')mSubs(null);else if(S.tab==='Exp')mExp(null);else if(S.tab==='Shop')mShop(null);else mWish(null);}
function onShare(){if(S.tab==='Shop')doShareShop();else doShareWish();}

/* ══════════════════════════════════════════════════════════════
   SUBSCRIPTIONS
══════════════════════════════════════════════════════════════ */
const PL={month:'Месяц',year:'1 год',two_years:'2 года'};
function rSubs(){
  const el=document.getElementById('listSubs');
  const act=S.subs.filter(s=>s.active);
  const total=S.subs.filter(s=>s.active).reduce((a,s)=>a+norm(s.prices[s.sel]??0,s.sel,S.subP),0);
  const detail=act.map(s=>s.name+': '+fmt(Math.round(norm(s.prices[s.sel]??0,s.sel,S.subP)))+'₽').join(' · ');

  el.innerHTML=`<div class="sum-card">
    <div class="sum-card-top">${act.length} из ${S.subs.length} активны</div>
    <div class="sum-card-amt">${fmt(Math.round(total))} ₽</div>
    <div class="sum-card-sub">${esc(detail)||'нет активных'}</div>
    <div class="sum-tabs">
      ${[['month','В месяц'],['year','За год'],['two_years','За 2 года']].map(([p,l])=>`
        <button class="stab ${p===S.subP?'active':''}" onclick="setSubP('${p}')">${l}</button>`).join('')}
    </div></div>`
  +(S.subs.length?S.subs.map(subCard).join(''):`<div class="empty"><div class="empty-icon">💳</div><div class="empty-title">Нет подписок</div><div class="empty-sub">Нажми + чтобы добавить</div></div>`);
}
function subCard(s){
  const pills=['month','year','two_years'].map(p=>{
    const pr=s.prices[p];const isA=s.sel===p;const na=!pr;
    return `<button class="pill ${isA?'on':''} ${na?'na':''}" ${na?'disabled':`onclick="subP('${s.id}','${p}')"`}>
      ${PL[p]}<div class="pill-sub">${pr?fmt(pr)+' ₽':'—'}</div></button>`;
  }).join('');
  return `<div class="card ${s.active?'':'off'}">
    <div class="card-top">
      <label class="tog"><input type="checkbox" ${s.active?'checked':''} onchange="subTog('${s.id}',this.checked)"><span class="tog-tr"></span></label>
      <span class="card-name">${esc(s.name)}</span>
      <span class="card-amt">${fmt(s.prices[s.sel]??0)} ₽</span>
    </div>
    <div class="pills">${pills}</div>
    ${s.note?`<div class="card-note">📌 ${esc(s.note)}</div>`:''}
    <div class="card-actions">
      <button class="card-btn e" onclick="mSubs('${s.id}')">✏️ Изменить</button>
      <button class="card-btn d" onclick="delI('subs','${s.id}')">🗑 Удалить</button>
    </div></div>`;
}

const FL={month:'в месяц',week:'в неделю',year:'в год',once:'разово'};
function rExp(){
  const el=document.getElementById('listExp');
  const act=S.exps.filter(e=>e.active);
  const total=act.reduce((a,e)=>{
    let m=e.freq==='month'?e.amt:e.freq==='week'?e.amt*4.33:e.freq==='year'?e.amt/12:0;
    return a+(S.expP==='month'?m:S.expP==='year'?m*12:m*24);
  },0);
  const detail=act.slice(0,4).map(e=>e.name+': '+fmt(e.amt)+'₽ '+FL[e.freq]).join(' · ');

  el.innerHTML=`<div class="sum-card">
    <div class="sum-card-top">${act.length} из ${S.exps.length} активны</div>
    <div class="sum-card-amt">${fmt(Math.round(total))} ₽</div>
    <div class="sum-card-sub">${esc(detail)||'нет активных'}</div>
    <div class="sum-tabs">
      ${[['month','В месяц'],['year','За год'],['two_years','За 2 года']].map(([p,l])=>`
        <button class="stab ${p===S.expP?'active':''}" onclick="setExpP('${p}')">${l}</button>`).join('')}
    </div></div>`
  +(S.exps.length?S.exps.map(e=>`
    <div class="card ${e.active?'':'off'}">
      <div class="card-top">
        <label class="tog"><input type="checkbox" ${e.active?'checked':''} onchange="expTog('${e.id}',this.checked)"><span class="tog-tr"></span></label>
        <span class="card-name">${esc(e.name)}</span>
        <span class="freq-badge">${FL[e.freq]||e.freq}</span>
        <span class="card-amt">${fmt(e.amt)} ₽</span>
      </div>
      ${e.note?`<div class="card-note">📌 ${esc(e.note)}</div>`:''}
      <div class="card-actions">
        <button class="card-btn e" onclick="mExp('${e.id}')">✏️ Изменить</button>
        <button class="card-btn d" onclick="delI('exps','${e.id}')">🗑 Удалить</button>
      </div></div>`).join('')
  :`<div class="empty"><div class="empty-icon">💸</div><div class="empty-title">Нет расходов</div><div class="empty-sub">Нажми + чтобы добавить</div></div>`);
}
function expTog(id,v){const e=S.exps.find(e=>e.id===id);if(e){e.active=v;save(K.exps,S.exps);rExp();}}
function setExpP(p){S.expP=p;rExp();}

    <div class="field"><div class="fl">Ваше имя</div><input class="fi" id="fBN" placeholder="Например: Иван"></div>
    <button class="btn-p" onclick="confirmBook()">✓ Забронировать</button>
    <button class="btn-s" onclick="closeSheet()">Отмена</button>`);
}
function confirmBook(){
  const bn=q('fBN').value.trim();if(!bn){toast('Введи своё имя');return;}
  const {btn,name}=S.pendingBookItem;
  const msg=`🎁 Привет! Я, ${bn}, хочу подарить тебе «${name}»! Бронирую это для тебя 😊`;
  btn.textContent='✓ Забронировано';btn.disabled=true;btn.style.background='var(--green)';
  closeSheet();
  setTimeout(()=>{
    cpyTxt(msg,'Сообщение скопировано! Отправь хозяину вишлиста 🎁');
  },350);
}

function showSVShop(data){
  let st=(data.items||[]).map(i=>({...i,chk:false}));
  document.getElementById('svTitle').textContent='🛒 Список покупок';
  function renderSL(){
    const done=st.filter(s=>s.chk).length,total=st.length,pct=total?Math.round(done/total*100):0;
    document.getElementById('svBody').innerHTML=`
      <div class="card" style="padding:12px 14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:14px;font-weight:600">${done} из ${total} куплено</span>
          <span style="font-size:13px;color:var(--hint)">${pct}%</span></div>
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div></div>`
    +[...st.filter(s=>!s.chk),...st.filter(s=>s.chk)].map(item=>`
      <div class="shop-item">
        <div class="shop-chk ${item.chk?'done':''}" onclick="slTog('${item.id}')"></div>
        <div class="shop-info">
          <div class="shop-name ${item.chk?'done':''}">${esc(item.name)}${item.qty?` <span style="color:var(--hint)">× ${esc(String(item.qty))}</span>`:''}</div>
          ${item.note?`<div class="shop-meta">${esc(item.note)}</div>`:''}
        </div>
        ${item.photo?`<img class="shop-thumb" src="${esc(item.photo)}" onerror="this.style.display='none'" alt="">`:``}
        <div class="shop-acts">${item.link?`<button class="icon-btn" onclick="openLnk('${esc(item.link)}')">🔗</button>`:''}</div>
      </div>`).join('');
    window.slTog=id=>{const i=st.find(s=>s.id===id);if(i){i.chk=!i.chk;renderSL();}};
  }
  renderSL();
  document.getElementById('sv').classList.add('open');
}

function closeSV(){document.getElementById('sv').classList.remove('open');history.replaceState(null,'',location.pathname);}

/* ══════════════════════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════════════════════ */
function openSheet(title,body){
  document.getElementById('sheet').innerHTML=`<div class="sh-handle"></div><div class="sh-title">${title}</div>${body}`;
  document.getElementById('ov').classList.add('open');
}
function closeSheet(){document.getElementById('ov').classList.remove('open');}
function ovBg(e){if(e.target===document.getElementById('ov'))closeSheet();}
function phPrev(inp,pid){const img=document.getElementById(pid);if(!img)return;if(inp.value){img.src=inp.value;img.classList.add('show');img.onerror=()=>img.classList.remove('show');}else img.classList.remove('show');}

/* ══════════════════════════════════════════════════════════════
   SHARED ACTIONS
══════════════════════════════════════════════════════════════ */
function delI(sec,id){
  const doIt=()=>{S[sec]=S[sec].filter(i=>i.id!==id);save(K[sec],S[sec]);
    if(sec==='subs')rSubs();else if(sec==='exps')rExp();else if(sec==='shops')rShop();else rWish();
    toast('Удалено');};
  if(tg)tg.showConfirm('Удалить?',ok=>ok&&doIt());else if(confirm('Удалить?'))doIt();
}
function openLnk(url){if(tg){try{tg.openLink(url);return;}catch{}}window.open(url,'_blank');}

/* ══════════════════════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════════════════════ */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fmt(n){return Math.round(n).toLocaleString('ru-RU');}
function pn(v){const n=parseFloat(v);return isNaN(n)||n<=0?null:n;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}
function q(id){return document.getElementById(id);}
function enc(d){try{return btoa(unescape(encodeURIComponent(JSON.stringify(d))));}catch{return '';}}
function dec(s){try{return JSON.parse(decodeURIComponent(escape(atob(s))));}catch{return null;}}

let _tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2400);}

function cpyTxt(text,msg){
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>toast(msg||'Скопировано! ✓'));}
  else{const el=document.createElement('textarea');el.value=text;document.body.appendChild(el);el.select();try{document.execCommand('copy');toast(msg||'Скопировано! ✓');}catch{}document.body.removeChild(el);}
}

init();
</script>
</body>
